app-id: com.github.chirik.ChirikSIP
runtime: org.kde.Platform
runtime-version: '6.7'
sdk: org.kde.Sdk
command: chiriksip

finish-args:
  - --share=network
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=all

modules:
  - name: pjproject
    buildsystem: autotools
    config-opts:
      - --prefix=/app
      - --enable-shared
      - --disable-static
      - --disable-video
      - --disable-silk
      - --disable-opencore-amr
      - --disable-libyuv
      - --disable-libwebrtc
      - --disable-sound
      - --enable-alsa
    sources:
      - type: archive
        url: https://github.com/pjsip/pjproject/archive/refs/tags/2.13.1.tar.gz
        sha256: 32a5ab5bfbb9752cb6a46627e4c410e61939c8dbbd833ac858473cfbd9fb9d7d

  - name: portaudio
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_INSTALL_PREFIX=/app
      - -DCMAKE_BUILD_TYPE=Release
      - -DPA_USE_ALSA=ON
      - -DPA_USE_PULSEAUDIO=ON
      - -DPA_USE_JACK=OFF
    sources:
      - type: archive
        url: https://github.com/PortAudio/portaudio/archive/refs/tags/v19.7.0.tar.gz
        sha256: 5af29ba58bbdbb7bbcefaaecc77ec8fc413f0db6f4c4e286c40c3e1b83174fa0

  - name: chiriksip
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_INSTALL_PREFIX=/app
      - -DCMAKE_BUILD_TYPE=Release
    post-install:
      - sed -i 's/Icon=chiriksip/Icon=com.github.chirik.ChirikSIP/' resources/chiriksip.desktop
      - install -Dm644 resources/chiriksip.desktop /app/share/applications/com.github.chirik.ChirikSIP.desktop
      - install -Dm644 com.github.chirik.ChirikSIP.metainfo.xml /app/share/metainfo/com.github.chirik.ChirikSIP.metainfo.xml
      - install -Dm644 resources/icons/chiriksip.png /app/share/icons/hicolor/512x512/apps/com.github.chirik.ChirikSIP.png
      - install -Dm644 resources/icons/128x128/chiriksip.png /app/share/icons/hicolor/128x128/apps/com.github.chirik.ChirikSIP.png
      - install -Dm644 resources/icons/64x64/chiriksip.png /app/share/icons/hicolor/64x64/apps/com.github.chirik.ChirikSIP.png
      - install -Dm644 resources/icons/48x48/chiriksip.png /app/share/icons/hicolor/48x48/apps/com.github.chirik.ChirikSIP.png
      - install -Dm644 resources/icons/32x32/chiriksip.png /app/share/icons/hicolor/32x32/apps/com.github.chirik.ChirikSIP.png
      - install -Dm644 resources/icons/16x16/chiriksip.png /app/share/icons/hicolor/16x16/apps/com.github.chirik.ChirikSIP.png
    sources:
      - type: dir
        path: .
