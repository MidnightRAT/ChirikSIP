name: Build DEB

permissions:
  contents: write

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'packaging/**'
      - 'debian/**'
      - 'CMakeLists.txt'
      - 'resources/**'
      - 'Containerfile.debbuild'
      - 'build-deb.sh'
      - '.github/workflows/build-deb.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-deb:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ubuntu: ['22.04', '24.04']

    steps:
      - uses: actions/checkout@v4

      - name: Install podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Build DEB for Ubuntu ${{ matrix.ubuntu }}
        run: |
          chmod +x build-deb.sh
          ./build-deb.sh "${{ matrix.ubuntu }}"

      - name: Upload DEB artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chiriksip-deb-u${{ matrix.ubuntu }}
          path: build/debs/*.deb

  publish-deb:
    needs: build-deb
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Download all DEB artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: chiriksip-deb-*
          path: artifacts
          merge-multiple: true

      - name: Get version
        id: version
        run: echo "version=$(grep '^Version:' packaging/chiriksip.spec | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Publish to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: artifacts/*.deb
          fail_on_unmatched_files: false
