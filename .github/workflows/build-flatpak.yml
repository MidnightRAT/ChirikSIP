name: Build Flatpak

permissions:
  contents: write

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'packaging/**'
      - 'CMakeLists.txt'
      - 'resources/**'
      - 'com.github.chirik.ChirikSIP.yml'
      - 'com.github.chirik.ChirikSIP.metainfo.xml'
      - '.github/workflows/build-flatpak.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-flatpak:
    runs-on: ubuntu-latest
    container:
      image: bilelmoussaoui/flatpak-github-actions:freedesktop-23.08
      options: --privileged

    steps:
      - uses: actions/checkout@v4

      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          manifest-path: com.github.chirik.ChirikSIP.yml
          bundle: chiriksip.flatpak
          cache-key: flatpak-builder-${{ github.sha }}

      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: chiriksip-flatpak
          path: chiriksip.flatpak

  publish-flatpak:
    needs: build-flatpak
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Download Flatpak artifact
        uses: actions/download-artifact@v4
        with:
          name: chiriksip-flatpak
          path: artifacts

      - name: Create source tarball
        run: |
          VERSION=$(grep '^Version:' packaging/chiriksip.spec | awk '{print $2}')
          RELEASE=$(grep '^Release:' packaging/chiriksip.spec | grep -o '[0-9]*')
          tar czf artifacts/chiriksip-${VERSION}-${RELEASE}.tar.gz \
            --transform "s,^,chiriksip-${VERSION}/," \
            -X .rpmignore .

      - name: Get version
        id: version
        run: echo "version=$(grep '^Version:' packaging/chiriksip.spec | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Publish to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: |
            artifacts/*.flatpak
            artifacts/*.tar.gz
          fail_on_unmatched_files: false
