name: Build Linux RPM

on:
  push:
    branches: [ dev-ghaction, main ]
    paths:
      - 'src/**'
      - 'packaging/**'
      - 'CMakeLists.txt'
      - 'resources/**'
      - '.github/workflows/build-linux.yml'
  pull_request:
    branches: [ dev-ghaction, main ]
    paths:
      - 'src/**'
      - 'packaging/**'
      - 'CMakeLists.txt'
      - 'resources/**'

jobs:
  build-rpm:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Enable universe repository
        run: |
          sudo add-apt-repository -y universe
          sudo apt-get update

      - name: Install build dependencies
        run: |
          sudo apt-get install -y \
            build-essential \
            cmake \
            g++ \
            make \
            pkg-config \
            qt6-base-dev \
            portaudio19-dev \
            libssl-dev \
            libasound2-dev \
            rpm

      - name: Build PJSIP from source
        run: |
          git clone --depth 1 --branch 2.13.1 https://github.com/pjsip/pjproject.git
          cd pjproject
          ./configure \
            --prefix=/usr \
            --enable-shared \
            --disable-static \
            --disable-video \
            --disable-silk \
            --disable-opencore-amr \
            --disable-libyuv \
            --disable-libwebrtc
          make dep
          make -j$(nproc)
          sudo make install
          sudo ldconfig

      - name: Create rpmbuild tree
        run: |
          mkdir -p ~/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}

      - name: Create source tarball
        run: |
          VERSION=$(grep 'Version:' packaging/chiriksip.spec | awk '{print $2}')
          tar czf ~/rpmbuild/SOURCES/chiriksip-${VERSION}.tar.gz \
            --transform "s,^,chiriksip-${VERSION}/," \
            --exclude build \
            --exclude build-win32 \
            --exclude build-win64 \
            --exclude dist-win32 \
            --exclude dist-win64 \
            --exclude .git \
            --exclude .gitignore \
            --exclude .mimocode \
            .

      - name: Build source RPM
        run: rpmbuild -bs packaging/chiriksip.spec

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          cp ~/rpmbuild/SRPMS/*.rpm artifacts/ 2>/dev/null || true

      - name: Upload RPM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chiriksip-linux-srcrpm
          path: artifacts/

  build-cmake:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Enable universe repository
        run: |
          sudo add-apt-repository -y universe
          sudo apt-get update

      - name: Install build dependencies
        run: |
          sudo apt-get install -y \
            build-essential \
            cmake \
            g++ \
            make \
            pkg-config \
            qt6-base-dev \
            portaudio19-dev \
            libssl-dev \
            libasound2-dev

      - name: Build PJSIP from source
        run: |
          git clone --depth 1 --branch 2.13.1 https://github.com/pjsip/pjproject.git
          cd pjproject
          ./configure \
            --prefix=/usr \
            --enable-shared \
            --disable-static \
            --disable-video \
            --disable-silk \
            --disable-opencore-amr \
            --disable-libyuv \
            --disable-libwebrtc
          make dep
          make -j$(nproc)
          sudo make install
          sudo ldconfig

      - name: Configure ChirikSIP
        run: |
          mkdir build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr

      - name: Build ChirikSIP
        run: cmake --build build

      - name: Validate desktop file
        run: |
          sudo apt-get install -y desktop-file-utils
          desktop-file-validate resources/chiriksip.desktop || true

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: chiriksip-linux-binary
          path: build/chiriksip
