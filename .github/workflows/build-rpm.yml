name: Build RPM

permissions:
  contents: write

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'packaging/**'
      - 'CMakeLists.txt'
      - 'resources/**'
      - 'Containerfile.rpmbuild'
      - 'build-rpm.sh'
      - '.github/workflows/build-rpm.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-rpm:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        fedora: ['43', '44']

    steps:
      - uses: actions/checkout@v4

      - name: Install podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Build RPM for Fedora ${{ matrix.fedora }}
        run: |
          chmod +x build-rpm.sh
          ./build-rpm.sh "${{ matrix.fedora }}"

      - name: Upload RPM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chiriksip-rpm-f${{ matrix.fedora }}
          path: build/rpms/*.rpm

  publish-rpm:
    needs: build-rpm
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Download all RPM artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: chiriksip-rpm-f*
          path: artifacts
          merge-multiple: true

      - name: Remove debug packages
        run: rm -f artifacts/*debuginfo*.rpm artifacts/*debugsource*.rpm

      - name: Get version
        id: version
        run: echo "version=$(grep '^Version:' packaging/chiriksip.spec | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Publish to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: artifacts/*x86_64.rpm
          fail_on_unmatched_files: false
